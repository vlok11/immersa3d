version: '3.8'

services:
  # Frontend Service
  frontend:
    container_name: immersa-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      # In Docker network, we can talk to services by name, but client-side browser needs /api relative path which Nginx handles
      - NEXT_PUBLIC_API_URL=/
      - NEXT_PUBLIC_AI_URL=/ai-service
    depends_on:
      - backend
      - ai-service
    networks:
      - immersa-network

  # Backend Service
  backend:
    container_name: immersa-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    depends_on:
      - minio
    networks:
      - immersa-network

  # AI Service
  ai-service:
    container_name: immersa-ai-service
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: always
    networks:
      - immersa-network

  # MinIO (Object Storage)
  minio:
    image: minio/minio
    container_name: immersa-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=immersa_minio
      - MINIO_ROOT_PASSWORD=immersa_minio_password
    volumes:
      - minio_data:/data
    networks:
      - immersa-network

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: immersa-nginx
    ports:
      - "80:80"
      - "9001:9001" # Expose MinIO Console optionally
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - immersa-network

networks:
  immersa-network:
    driver: bridge

volumes:
  minio_data:
